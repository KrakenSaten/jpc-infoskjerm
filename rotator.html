<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPC Skjermrotator</title>
  <style>
    :root {
      --bg: #050b12;
      --panel: rgba(10, 18, 28, 0.92);
      --text: #f5f1e8;
      --muted: #a7b5c5;
      --accent: #79c7ff;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(121,199,255,0.16), transparent 30%),
        linear-gradient(145deg, #050b12, #0b1520 48%, #102131);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 64px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      min-width: 420px;
    }
    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .page-name {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }
    .countdown {
      color: var(--accent);
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 6px;
    }
    .countdown-label {
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">JPC skjermrotator</p>
    <p id="page-name" class="page-name"></p>
    <p id="countdown" class="countdown"></p>
    <p class="countdown-label">sekunder til bytte</p>
  </div>

  <script>
    // Konfigurasjon — endre varighet her (sekunder)
    var PAGES = [
      { title: "JPC infoskjerm", url: "./index.html",                                 duration: 60 },
      { title: "NOC oversikt",   url: "http://inm.jpc.no:8080/noc.view.xsi?index=2", duration: 60 },
    ];

    var STORAGE_KEY = "jpc_rotator_state";

    // Les eller initialiser tilstand
    function getState() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return null;
    }

    function setState(pageIndex, switchAt) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          pageIndex: pageIndex,
          switchAt: switchAt
        }));
      } catch(e) {}
    }

    // Sjekk om vi kom tilbake fra en ekstern side (NOC)
    // og om det allerede er tid for å bytte
    var state = getState();
    var now = Date.now();

    var pageIndex;
    var switchAt;

    if (state && state.switchAt && now >= state.switchAt) {
      // Tid for neste side
      pageIndex = ((state.pageIndex || 0) + 1) % PAGES.length;
      switchAt = now + PAGES[pageIndex].duration * 1000;
      setState(pageIndex, switchAt);
    } else if (state && state.switchAt && now < state.switchAt) {
      // Vi kom tilbake for tidlig (f.eks. refresh) — fortsett der vi var
      pageIndex = state.pageIndex || 0;
      switchAt = state.switchAt;
    } else {
      // Første gang
      pageIndex = 0;
      switchAt = now + PAGES[pageIndex].duration * 1000;
      setState(pageIndex, switchAt);
    }

    var page = PAGES[pageIndex];
    var nextIndex = (pageIndex + 1) % PAGES.length;

    document.getElementById("page-name").textContent = page.title;

    // Countdown-visning
    function updateCountdown() {
      var secs = Math.max(0, Math.ceil((switchAt - Date.now()) / 1000));
      document.getElementById("countdown").textContent = secs;
    }
    updateCountdown();

    var timer = setInterval(function() {
      var secs = Math.ceil((switchAt - Date.now()) / 1000);
      document.getElementById("countdown").textContent = Math.max(0, secs);
      if (Date.now() >= switchAt) {
        clearInterval(timer);
        // Oppdater state til neste side
        var ni = (pageIndex + 1) % PAGES.length;
        setState(ni, Date.now() + PAGES[ni].duration * 1000);
        // Naviger til siden
        window.location.href = PAGES[ni].url === "./index.html"
          ? "./index.html?rotateBack=" + encodeURIComponent("./rotator.html")
          : PAGES[ni].url;
      }
    }, 500);

    // Naviger til gjeldende side etter 3 sekunder
    setTimeout(function() {
      if (page.url === "./index.html") {
        window.location.href = "./index.html?rotateBack=" + encodeURIComponent("./rotator.html");
      } else {
        // Ekstern side (NOC) — vi navigerer dit, og localStorage husker
        // at vi skal tilbake til rotatoren når vi returnerer
        window.location.href = page.url;
      }
    }, 3000);
  </script>
</body>
</html>
