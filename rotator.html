<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPC Skjermrotator</title>
  <style>
    :root {
      --bg: #050b12;
      --panel: rgba(10, 18, 28, 0.88);
      --text: #f5f1e8;
      --muted: #a7b5c5;
      --accent: #79c7ff;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(121, 199, 255, 0.16), transparent 30%),
        linear-gradient(145deg, #050b12, #0b1520 48%, #102131);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      position: relative;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #08111a;
    }

    .overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      z-index: 2;
      pointer-events: none;
    }

    .meta {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .title,
    .status {
      margin: 0;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .status {
      color: var(--accent);
      font-size: 0.96rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      z-index: 3;
      background: rgba(5, 11, 18, 0.92);
    }

    .fallback-card {
      max-width: 720px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
    }

    .fallback-card h1,
    .fallback-card p {
      margin-top: 0;
    }

    .fallback-card a {
      color: var(--accent);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <iframe id="rotator-frame" class="frame" title="JPC skjermrotator"></iframe>

  <div class="overlay" aria-hidden="true">
    <div class="meta">
      <p class="eyebrow">JPC skjermrotator</p>
      <p id="page-title" class="title">Laster side...</p>
    </div>
    <p id="rotation-status" class="status">Bytter om 60 sek</p>
  </div>

  <div id="fallback" class="fallback">
    <div class="fallback-card">
      <h1>Kunne ikke laste siden i ramme</h1>
      <p>Noen nettsider blokkerer visning i iframe. Hvis det skjer, åpne sidene direkte:</p>
      <p><a id="fallback-link-1" href="#" target="_blank" rel="noreferrer noopener"></a></p>
      <p><a id="fallback-link-2" href="#" target="_blank" rel="noreferrer noopener"></a></p>
    </div>
  </div>

  <script>
    const ROTATION_MS = 60_000;
    const EXTERNAL_PAGE_TIMEOUT_MS = 8_000;
    const PAGES = [
      {
        title: "JPC infoskjerm",
        url: (location.protocol === "file:" ? "https://krakensaten.github.io/jpc-infoskjerm/index.html" : "./index.html"),
      },
      {
        title: "NOC oversikt",
        url: "http://inm.jpc.no:8080/noc.view.xsi?index=2",
        external: true,
      },
    ];

    const elements = {
      frame: document.querySelector("#rotator-frame"),
      pageTitle: document.querySelector("#page-title"),
      rotationStatus: document.querySelector("#rotation-status"),
      fallback: document.querySelector("#fallback"),
      fallbackLink1: document.querySelector("#fallback-link-1"),
      fallbackLink2: document.querySelector("#fallback-link-2"),
    };

    let activeIndex = 0;
    let nextSwapAt = Date.now() + ROTATION_MS;
    let externalPageTimeout = null;

    function updateFallbackLinks() {
      elements.fallbackLink1.href = PAGES[0].url;
      elements.fallbackLink1.textContent = PAGES[0].url;
      elements.fallbackLink2.href = PAGES[1].url;
      elements.fallbackLink2.textContent = PAGES[1].url;
    }

    function clearExternalPageTimeout() {
      if (externalPageTimeout) {
        window.clearTimeout(externalPageTimeout);
        externalPageTimeout = null;
      }
    }

    function hideFallback() {
      elements.fallback.style.display = "none";
    }

    function showPage(index) {
      const page = PAGES[index];
      activeIndex = index;
      nextSwapAt = Date.now() + ROTATION_MS;
      elements.pageTitle.textContent = page.title;
      hideFallback();
      clearExternalPageTimeout();
      elements.frame.src = page.url;

      if (page.external) {
        externalPageTimeout = window.setTimeout(() => {
          elements.fallback.style.display = "grid";
        }, EXTERNAL_PAGE_TIMEOUT_MS);
      }
    }

    function rotatePage() {
      const nextIndex = (activeIndex + 1) % PAGES.length;
      showPage(nextIndex);
    }

    function updateCountdown() {
      const secondsLeft = Math.max(0, Math.ceil((nextSwapAt - Date.now()) / 1000));
      elements.rotationStatus.textContent = `Bytter om ${secondsLeft} sek`;
    }

    function handleFrameError() {
      elements.fallback.style.display = "grid";
    }

    function handleFrameLoad() {
      hideFallback();
      clearExternalPageTimeout();
    }

    updateFallbackLinks();
    showPage(0);
    updateCountdown();

    elements.frame.addEventListener("error", handleFrameError);
    elements.frame.addEventListener("load", handleFrameLoad);

    window.setInterval(updateCountdown, 1000);
    window.setInterval(rotatePage, ROTATION_MS);
  </script>
</body>
</html>
