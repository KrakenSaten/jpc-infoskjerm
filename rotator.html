<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPC Skjermrotator</title>
  <style>
    :root {
      --bg: #050b12;
      --panel: rgba(10, 18, 28, 0.92);
      --text: #f5f1e8;
      --muted: #a7b5c5;
      --accent: #79c7ff;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(121,199,255,0.16), transparent 30%),
        linear-gradient(145deg, #050b12, #0b1520 48%, #102131);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 56px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      min-width: 400px;
    }
    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .page-name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    .countdown {
      color: var(--accent);
      font-size: 3.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 8px;
    }
    .countdown-label {
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">JPC skjermrotator</p>
    <p id="page-name" class="page-name"></p>
    <p id="countdown" class="countdown"></p>
    <p class="countdown-label">sekunder</p>
  </div>

  <script>
    const PAGES = [
      { title: "JPC infoskjerm", url: "./index.html",                                 duration: 60 },
      { title: "NOC oversikt",   url: "http://inm.jpc.no:8080/noc.view.xsi?index=2", duration: 60 },
    ];

    // Hent hvilken side som skal vises nå fra URL-parameteren ?page=N
    const params    = new URLSearchParams(window.location.search);
    const pageIndex = parseInt(params.get("page") ?? "0", 10) % PAGES.length;
    const page      = PAGES[pageIndex];
    const nextIndex = (pageIndex + 1) % PAGES.length;

    document.getElementById("page-name").textContent = page.title;

    let secondsLeft = page.duration;
    document.getElementById("countdown").textContent = secondsLeft;

    const timer = setInterval(() => {
      secondsLeft -= 1;
      document.getElementById("countdown").textContent = secondsLeft;
      if (secondsLeft <= 0) {
        clearInterval(timer);

        if (pageIndex === 0) {
          // Viser infoskjermen — legg til ?rotateBack=URL i index.html
          // slik at den sender oss tilbake hit med neste page-index
          const returnUrl = encodeURIComponent(
            location.origin + location.pathname.replace("rotator.html", "") +
            "rotator.html?page=" + nextIndex
          );
          window.location.href = "./index.html?rotateBack=" + returnUrl;
        } else {
          // Viser NOC — navigerer direkte dit. NOC har ingen rotator-logikk,
          // så vi planlegger retur via sessionStorage som leses av rotator.html.
          sessionStorage.setItem("rotator_return", JSON.stringify({
            returnUrl: location.origin + location.pathname.replace("rotator.html","") + "rotator.html?page=" + nextIndex,
            returnAt: Date.now() + page.duration * 1000
          }));
          window.location.href = page.url;
        }
      }
    }, 1000);
  </script>
</body>
</html>
